services:
  sftp-client:
    build: .
    image: sftp-client
    container_name: sftp-client
    ports:
      - "8040:8000"
    environment:
      DATA_DIR: "/data"
      SESSION_TTL_SECONDS: "1800"
      HOST_HOME: "/host"
      # Set a persistent encryption key (generate with: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      SFTP_ENCRYPTION_KEY: "KQaZz3XL9u0vdGh71BIw5b1mdGxShUZo_tWWRpn73xg="
    volumes:
      # Persistent storage for bookmarks database and encryption key
      - ./data:/data
      # Mount host home directory for local file browsing
      - ~:/host:ro
      # Use host's DNS resolver for Tailscale names (macOS/Linux)
      - /etc/resolv.conf:/etc/resolv.conf:ro
    # Alternative: Use host network (Linux only, better for Tailscale)
    # network_mode: host
    # If using host network, change port to 8040 in CMD below
    dns:
      # Tailscale DNS server (MagicDNS)
      - 100.100.100.100
      # Fallback to Google DNS
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
