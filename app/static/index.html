<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belfast SFTP Client</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="#58a6ff" stroke-width="2" fill="none"/>
                        <path d="M24 24L4 14M24 24l20-10M24 24v20" stroke="#58a6ff" stroke-width="2"/>
                        <circle cx="24" cy="24" r="4" fill="#58a6ff"/>
                    </svg>
                    <h1>Belfast SFTP</h1>
                    <p class="tagline">Secure File Transfer</p>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="host">Host</label>
                        <input type="text" id="host" placeholder="sftp.example.com" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="port">Port</label>
                            <input type="number" id="port" value="22" min="1" max="65535">
                        </div>
                        <div class="form-group flex-grow">
                            <label for="username">Username</label>
                            <input type="text" id="username" placeholder="username" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <span class="btn-text">Connect</span>
                        <span class="btn-spinner hidden">⟳</span>
                    </button>
                </form>
                
                <div id="login-error" class="error-message hidden"></div>
                
                <div class="footer">
                    <p>Belfast Estate Technologies</p>
                </div>
            </div>
        </div>
        
        <!-- Main App Screen -->
        <div id="app-screen" class="screen">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <div class="logo-small">
                        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                            <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="#58a6ff" stroke-width="3" fill="none"/>
                            <circle cx="24" cy="24" r="4" fill="#58a6ff"/>
                        </svg>
                        <span>Belfast SFTP</span>
                    </div>
                </div>
                
                <div class="header-center">
                    <div class="connection-info">
                        <span id="conn-status" class="status-dot connected"></span>
                        <span id="conn-details">Not connected</span>
                    </div>
                </div>
                
                <div class="header-right">
                    <button id="disconnect-btn" class="btn btn-secondary">Disconnect</button>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="app-main">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="breadcrumb" id="breadcrumb">
                        <span class="breadcrumb-root">/</span>
                    </div>
                    
                    <div class="toolbar-actions">
                        <button id="upload-btn" class="btn btn-icon" title="Upload Files">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </button>
                        <button id="mkdir-btn" class="btn btn-icon" title="New Folder">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                <line x1="12" y1="11" x2="12" y2="17"/>
                                <line x1="9" y1="14" x2="15" y2="14"/>
                            </svg>
                        </button>
                        <button id="refresh-btn" class="btn btn-icon" title="Refresh">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- File List -->
                <div class="file-list-container" id="file-drop-zone">
                    <div class="file-list-header">
                        <div class="col-name">Name</div>
                        <div class="col-size">Size</div>
                        <div class="col-date">Modified</div>
                        <div class="col-perms">Permissions</div>
                    </div>
                    
                    <div id="file-list" class="file-list">
                        <div class="loading-state">
                            <div class="spinner"></div>
                            <p>Connecting...</p>
                        </div>
                    </div>
                    
                    <input type="file" id="file-input" multiple class="hidden">
                </div>
            </main>
        </div>
        
        <!-- Toast Notifications -->
        <div id="toast-container"></div>
        
        <!-- Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title">Title</h3>
                <div id="modal-body"></div>
                <div class="modal-actions">
                    <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="modal-confirm" class="btn btn-primary">Confirm</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
